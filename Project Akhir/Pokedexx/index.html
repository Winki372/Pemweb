<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <h1 class="logo">Pokédex</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari Pokémon / ID...">
            <button id="surprise-btn" class="surprise-btn" title="Pilih Acak">Surprise Me!</button>
        </div>
    </header>

    <nav class="gen-tabs">
        <button class="tab-btn active" data-gen="1">Gen 1</button>
        <button class="tab-btn" data-gen="2">Gen 2</button>
        <button class="tab-btn" data-gen="3">Gen 3</button>
        <button class="tab-btn" data-gen="4">Gen 4</button>
        <button class="tab-btn" data-gen="5">Gen 5</button>
    </nav>

    <main class="container">
        <div id="pokedex-grid" class="grid"></div>
        <div id="loading" class="loading-spinner hidden">Memuat...</div>
    </main>

    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
